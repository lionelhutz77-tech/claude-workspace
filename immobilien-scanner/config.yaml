# Immobilien-Scanner Konfiguration für Oberhausen (46149)

search_criteria:
  # Geografisch
  postleitzahl: "46149"
  stadt: "Oberhausen"
  suchradius_km: 5  # Optional für erweiterte Suche

  # Immobilien-Typ
  min_wohnungen: 2
  immobilien_typ: "Mehrfamilienhaus"  # oder auch "Haus", "Wohnung" möglich

  # Kaufpreis (optional Filter)
  min_kaufpreis: 100000
  max_kaufpreis: 750000

  # Miet-Annahmen
  kaltmiete_pro_einheit: 950  # EUR/Monat

  # Nebenkosten-Berechnung (monatlich pro Wohnung)
  verwaltungsquote_prozent: 10  # % der Kaltmiete
  instandhaltung_euro_pro_qm: 1.50
  versicherung_monatlich: 40
  leerstand_puffer_prozent: 3

  # Finanzierung (für Renditeberechnung)
  ltv_prozent: 80  # Loan-to-Value
  zinssatz_prozent: 4.0
  tilgung_prozent: 1.0

# Bewertungs-Schwellwerte — ZWEI KATEGORIEN
evaluation_thresholds:

  # KATEGORIE 1: PROFIT (klassisches Investment)
  # Mehrfamilienhäuser überall in Oberhausen, min. 6% Rendite
  category_profit:
    min_cashflow_monatlich: 500  # EUR/Monat (investmentpunk minimum)
    min_rendite_prozent: 6  # % p.a. BRUTTO (break-even threshold)
    max_renovierungskosten: 50000  # EUR (> 50k = AUSSCHLUSS)
    suchradius_km: 15  # Ganz Oberhausen + Umgebung
    description: "Investitions-Immobilien mit 6%+ Rendite (selbsttragend)"

  # KATEGORIE 2: FAMILY (Vermietung an Eltern/Bekannte)
  # PLZ 46149 zentral, auch niedrige/keine Rendite ok
  category_family:
    min_cashflow_monatlich: 0  # EUR/Monat (auch negativ ok, solange überschaubar)
    min_rendite_prozent: 0  # % p.a. BRUTTO (Rendite sekundär!)
    max_renovierungskosten: 75000  # EUR (etwas mehr Spielraum)
    max_negativ_cashflow: -500  # EUR/Monat (bis -500€ ok für Familie)
    postleitzahl_only: "46149"  # Nur zentral
    description: "Family-Immobilien zur Vermietung an Eltern/Bekannte"

  # Rote Flaggen
  baujahr_vor: 1950  # Ältere Gebäude → Risiko-Analyse

  # Positive Merkmale (Bonus)
  positive_features:
    - "Garten"
    - "Balkon"
    - "Garage"
    - "Renoviert"
    - "Neue Heizung"
    - "Neue Fenster"

